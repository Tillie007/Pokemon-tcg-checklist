name: Update Pitch Black

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pitch-black:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Add Pitch Black set
        run: python scripts/update_pitch_black.py

      - name: Commit updated card data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Add Pitch Black card data'
          file_pattern: pokemon_cards_data.json pitch_black_debug.json
