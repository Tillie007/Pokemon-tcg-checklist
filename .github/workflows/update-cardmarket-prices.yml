name: Update Cardmarket prijzen

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cardmarket-prijzen bijwerken
        run: python scripts/update_prices.py --force

      - name: Resultaat tonen
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("prices.json")
          if p.exists():
              data = json.loads(p.read_text(encoding="utf-8"))
              print("updatedAt:", data.get("updatedAt"))
              print("totalCards:", data.get("totalCards"))
              print("matchedCards:", data.get("matchedCards"))
              print("pricedCards:", data.get("pricedCards"))
              print("matchTypes:", data.get("matchTypes"))
          else:
              print("prices.json bestaat niet")
          PY

      - name: Gewijzigde prijsbestanden bewaren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add prices.json price_history.json cardmarket_debug.json cardmarket_match_report.csv cardmarket_setcodes.csv cardmarket_set_mapping_candidates.csv cardmarket_unmatched_by_set.csv 2>/dev/null || true

          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Dagelijkse Cardmarket-prijzen bijwerken"
            git push
          else
            echo "Geen wijzigingen in prijsbestanden."
          fi
